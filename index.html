<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
  </head>
  <body>
    <div class="form-image">image here</div>
    <div class="form-page">
      <div class="text-register">
        <p>
          This is a real online service! You know you need something <br />
          like this in your life to help you realize your deepest dreams. <br />
          Sign up now to get started.
        </p>

        <h3>You know you want to.</h3>
      </div>
      <form action="" method="post">
        <p>
          <label for="first_name">FIRST NAME</label>
          <input type="text" id="first_name" name="first_name" value="Thor" />
        </p>

        <p>
          <label for="last_name">LAST NAME</label>
          <input type="text" id="last_name" name="last_name" value="Odinson" />
        </p>
      </form>
    </div>
  </body>
</html>
